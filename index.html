<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Lerillo WC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1508344928928-7105b87de382?q=80&w=2070')] bg-cover bg-center bg-fixed min-h-screen font-sans antialiased text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GRUPOS = {
            A: ["MEXICO", "SUDAFRICA", "COREA DEL SUR", "CHEQUIA"],
            B: ["CANADA", "BOSNIA", "QATAR", "SUIZA"],
            C: ["BRASIL", "MARRUECOS", "HAITI", "ESCOCIA"],
            D: ["EEUU", "PARAGUAY", "AUSTRALIA", "TURQUIA"],
            E: ["ALEMANIA", "CURAZAO", "COSTA DE MARFIL", "ECUADOR"],
            F: ["PAISES BAJOS", "JAPON", "SUECIA", "TUNEZ"],
            G: ["BELGICA", "EGIPTO", "IRAN", "NUEVA ZELANDA"],
            H: ["ESPAÑA", "CABO VERDE", "ARABIA SAUDI", "URUGUAY"],
            I: ["FRANCIA", "SENEGAL", "IRAK", "NORUEGA"],
            J: ["ARGENTINA", "ARGELIA", "AUSTRIA", "JORDANIA"],
            K: ["PORTUGAL", "RD CONGO", "UZBEKISTAN", "COLOMBIA"],
            L: ["INGLATERRA", "CROACIA", "GHANA", "PANAMA"]
        };

        const BANDERAS = {
            "MEXICO": "🇲🇽", "SUDAFRICA": "🇿🇦", "COREA DEL SUR": "🇰🇷", "CHEQUIA": "🇨🇿",
            "CANADA": "🇨🇦", "BOSNIA": "🇧🇦", "QATAR": "🇶🇦", "SUIZA": "🇨🇭",
            "BRASIL": "🇧🇷", "MARRUECOS": "🇲🇦", "HAITI": "🇭🇹", "ESCOCIA": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
            "EEUU": "🇺🇸", "PARAGUAY": "🇵🇾", "AUSTRALIA": "🇦🇺", "TURQUIA": "🇹🇷",
            "ALEMANIA": "🇩🇪", "CURAZAO": "🇨🇼", "COSTA DE MARFIL": "🇨🇮", "ECUADOR": "🇪🇨",
            "PAISES BAJOS": "🇳🇱", "JAPON": "🇯🇵", "SUECIA": "🇸🇪", "TUNEZ": "🇹🇳",
            "BELGICA": "🇧🇪", "EGIPTO": "🇪🇬", "IRAN": "🇮🇷", "NUEVA ZELANDA": "🇳🇿",
            "ESPAÑA": "🇪🇸", "CABO VERDE": "🇨🇻", "ARABIA SAUDI": "🇸🇦", "URUGUAY": "🇺🇾",
            "FRANCIA": "🇫🇷", "SENEGAL": "🇸🇳", "IRAK": "🇮🇶", "NORUEGA": "🇳🇴",
            "ARGENTINA": "🇦🇷", "ARGELIA": "🇩🇿", "AUSTRIA": "🇦🇹", "JORDANIA": "🇯🇴",
            "PORTUGAL": "🇵🇹", "RD CONGO": "🇨🇩", "UZBEKISTAN": "🇺🇿", "COLOMBIA": "🇨🇴",
            "INGLATERRA": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "CROACIA": "🇭🇷", "GHANA": "🇬🇭", "PANAMA": "🇵🇦"
        };

        const bandera = (eq) => BANDERAS[eq] ? `${BANDERAS[eq]} ${eq}` : (eq || '');

        const TODOS_LOS_EQUIPOS = Object.values(GRUPOS).flat().sort();

        const generarPartidosPorGrupo = (letra, equipos) => [
            { id: `${letra}1`, local: equipos[0], visitante: equipos[1] },
            { id: `${letra}2`, local: equipos[2], visitante: equipos[3] },
            { id: `${letra}3`, local: equipos[3], visitante: equipos[1] },
            { id: `${letra}4`, local: equipos[0], visitante: equipos[2] },
            { id: `${letra}5`, local: equipos[0], visitante: equipos[3] },
            { id: `${letra}6`, local: equipos[1], visitante: equipos[2] }
        ];

        const TODOS_LOS_PARTIDOS = Object.keys(GRUPOS).reduce((acc, letra) => {
            return [...acc, ...generarPartidosPorGrupo(letra, GRUPOS[letra])];
        }, []);

        const PUNTOS = {
            GRUPO_EXACTO: 25,
            GRUPO_GANADOR_GOL: 15,
            GRUPO_EMPATE_GOL: 12.5,
            GRUPO_GANADOR: 10,
            GRUPO_SOLO_GOL: 5,
            DIECISEISAVOS: 10,
            OCTAVOS: 20,
            CUARTOS: 30,
            SEMIFINALES: 40,
            FINAL: 50,
            POS_1: 80, POS_2: 60, POS_3: 40, POS_4: 20,
            GOLEADOR: 5
        };

        function calcularPuntosPartido(pronostico, real) {
            if (!pronostico || !real || pronostico.golesL === '' || pronostico.golesV === '' || real.golesL === undefined || real.golesL === '') return 0;
            const pl = parseInt(pronostico.golesL); const pv = parseInt(pronostico.golesV);
            const rl = parseInt(real.golesL); const rv = parseInt(real.golesV);

            if (pl === rl && pv === rv) return PUNTOS.GRUPO_EXACTO;
            
            const signoP = pl > pv ? '1' : pl < pv ? '2' : 'X';
            const signoR = rl > rv ? '1' : rl < rv ? '2' : 'X';
            const aciertaSigno = signoP === signoR;

            if (signoR === 'X' && aciertaSigno) return PUNTOS.GRUPO_EMPATE_GOL;
            if (aciertaSigno && (pl === rl || pv === rv)) return PUNTOS.GRUPO_GANADOR_GOL;
            if (aciertaSigno) return PUNTOS.GRUPO_GANADOR;
            if (pl === rl || pv === rv) return PUNTOS.GRUPO_SOLO_GOL;
            return 0;
        }

        function obtenerGolesJugador(nombreJugador, reales) {
            if (!nombreJugador || !reales || !reales.golesJugadores) return 0;
            const nombreLimpio = nombreJugador.trim().toUpperCase();
            const claveEncontrada = Object.keys(reales.golesJugadores).find(k => k.trim().toUpperCase() === nombreLimpio);
            return claveEncontrada ? reales.golesJugadores[claveEncontrada] : 0;
        }

        function calcularPorraTotal(apuesta, reales) {
            if (!reales) return 0;
            let total = 0;
            
            TODOS_LOS_PARTIDOS.forEach(partido => {
                total += calcularPuntosPartido(apuesta.partidos?.[partido.id], reales.partidos?.[partido.id]);
            });

            const fases = ['dieciseisavos', 'octavos', 'cuartos', 'semifinales', 'final'];
            fases.forEach(fase => {
                const jugados = apuesta.clasificados?.[fase] || [];
                const realesFase = reales.clasificados?.[fase] || [];
                const ptosFase = PUNTOS[fase.toUpperCase()];
                
                jugados.forEach(eq => {
                    if (eq && realesFase.some(r => r.trim().toUpperCase() === eq.trim().toUpperCase())) {
                        total += ptosFase;
                    }
                });
            });
            
            for (let i = 1; i <= 4; i++) {
                if (apuesta.posiciones?.[i] && apuesta.posiciones[i].trim().toUpperCase() === reales.posiciones?.[i]?.trim().toUpperCase()) {
                    total += PUNTOS[`POS_${i}`];
                }
            }
            
            (apuesta.goleadores || []).forEach(g => {
                total += obtenerGolesJugador(g, reales) * PUNTOS.GOLEADOR;
            });

            return total;
        }

        function PorraApp() {
            const [pestaña, setPestaña] = useState('pronosticos');
            const [participantes, setParticipantes] = useState([]);
            const [resultadosReales, setResultadosReales] = useState(null);

            useEffect(() => {
                const t = `?t=${new Date().getTime()}`;
                
                fetch(`./resultados.json${t}`)
                    .then(res => res.json())
                    .then(data => setResultadosReales(data))
                    .catch(() => console.log("resultados.json no encontrado"));

                fetch(`./participantes.json${t}`)
                    .then(res => res.json())
                    .then(data => setParticipantes(data))
                    .catch(() => console.log("participantes.json no encontrado"));
            }, []);

            return (
                <div class="min-h-screen bg-green-900/85 backdrop-blur-sm py-8 px-4">
                    <div class="max-w-6xl mx-auto">
                        <header class="text-center mb-8">
                            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight drop-shadow-md">Porra Lerillo WC 2026</h1>
                            <p class="text-emerald-200 mt-3 font-medium text-lg drop-shadow">Cuota: 20€ • Cierre: Martes 9 de Junio</p>
                        </header>

                        <nav class="flex flex-wrap justify-center gap-2 mb-8 bg-white/10 backdrop-blur-md p-2 rounded-2xl shadow-xl border border-white/20">
                            <button onClick={() => setPestaña('pronosticos')} class={`flex-1 py-3 px-4 rounded-xl font-bold text-sm transition ${pestaña === 'pronosticos' ? 'bg-yellow-400 text-green-900 shadow-md' : 'text-white hover:bg-white/20'}`}>
                                1. Mis Pronósticos
                            </button>
                            <button onClick={() => setPestaña('consulta')} class={`flex-1 py-3 px-4 rounded-xl font-bold text-sm transition ${pestaña === 'consulta' ? 'bg-yellow-400 text-green-900 shadow-md' : 'text-white hover:bg-white/20'}`}>
                                2. Consultar Grupo
                            </button>
                            <button onClick={() => setPestaña('ranking')} class={`flex-1 py-3 px-4 rounded-xl font-bold text-sm transition ${pestaña === 'ranking' ? 'bg-yellow-400 text-green-900 shadow-md' : 'text-white hover:bg-white/20'}`}>
                                3. Ranking Global
                            </button>
                        </nav>

                        <main>
                            {pestaña === 'pronosticos' && <FormularioInscripcion />}
                            {pestaña === 'consulta' && <SeccionConsulta participantes={participantes} reales={resultadosReales} />}
                            {pestaña === 'ranking' && <SeccionRanking participantes={participantes} reales={resultadosReales} />}
                        </main>
                    </div>
                </div>
            );
        }

        function FormularioInscripcion() {
            const [usuario, setUsuario] = useState({ nombre: '' });
            const [partidos, setPartidos] = useState(TODOS_LOS_PARTIDOS.reduce((acc, p) => ({ ...acc, [p.id]: { golesL: '', golesV: '' } }), {}));
            const [goleadores, setGoleadores] = useState(['', '', '', '', '']);
            const [posiciones, setPosiciones] = useState({ 1: '', 2: '', 3: '', 4: '' });
            
            const [clasificados, setClasificados] = useState({
                dieciseisavos: Array(32).fill(''),
                octavos: Array(16).fill(''),
                cuartos: Array(8).fill(''),
                semifinales: Array(4).fill(''),
                final: Array(2).fill('')
            });

            const prevencionTeclasInvalidas = (e) => {
                if (['e', 'E', '+', '-', '.', ','].includes(e.key)) {
                    e.preventDefault();
                }
            };

            const handleCambioGol = (id, campo, valor) => {
                setPartidos(prev => ({ ...prev, [id]: { ...prev[id], [campo]: valor } }));
            };

            const handleClasificado = (fase, index, valor) => {
                const nuevos = [...clasificados[fase]];
                nuevos[index] = valor;
                setClasificados({...clasificados, [fase]: nuevos});
            };

            const validarFormulario = () => {
                if (!usuario.nombre.trim()) return "Falta tu Apellido o Mote.";

                const faltanPartidos = Object.values(partidos).some(p => p.golesL === '' || p.golesV === '');
                if (faltanPartidos) return "Faltan resultados en la fase de grupos.";

                const fases = ['dieciseisavos', 'octavos', 'cuartos', 'semifinales', 'final'];
                for (const fase of fases) {
                    if (clasificados[fase].some(eq => eq === '')) return `Faltan equipos en ${fase}.`;
                    
                    const sinVacios = clasificados[fase].filter(eq => eq !== '');
                    if (new Set(sinVacios).size !== sinVacios.length) {
                        return `Hay equipos repetidos en la fase de ${fase}.`;
                    }
                }

                if ([1, 2, 3, 4].some(num => posiciones[num] === '')) return "Faltan posiciones en el podio.";
                const equiposPodio = [1, 2, 3, 4].map(num => posiciones[num]).filter(eq => eq !== '');
                if (new Set(equiposPodio).size !== equiposPodio.length) return "Hay equipos repetidos en el podio.";

                if (goleadores.some(g => g.trim() === '')) return "Faltan goleadores por elegir.";

                return null;
            };

            const errorValidacion = validarFormulario();

            const procesarYDescargar = () => {
                if (errorValidacion) return;

                const confirmacion = window.confirm("¡Atención!\n\nSe va a descargar el archivo de tu apuesta.\nEs imprescindible que envíes el archivo .json resultante al administrador para confirmar tu participación.\n\n¿Deseas continuar?");
                if (!confirmacion) return;

                const payload = { 
                    nombre: usuario.nombre, 
                    apuesta: { partidos, goleadores, posiciones, clasificados } 
                };
                const nombreLimpio = usuario.nombre.trim().replace(/\s+/g, '_');

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload));
                const dlAnchor = document.createElement('a');
                dlAnchor.setAttribute("href", dataStr);
                dlAnchor.setAttribute("download", `porra_${nombreLimpio}.json`);
                document.body.appendChild(dlAnchor);
                dlAnchor.click();
                dlAnchor.remove();

                setTimeout(() => {
                    alert("¡Apuesta descargada correctamente!\n\nPor favor, ve a tus descargas y envía el archivo JSON al administrador por WhatsApp.");
                }, 500);
            };

            return (
                <div class="space-y-6 max-w-4xl mx-auto">
                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-white/20">
                        <h2 class="text-xl font-bold text-white mb-4 drop-shadow">1. Identificación</h2>
                        <div class="max-w-md">
                            <input type="text" placeholder="Escribe tu Apellido o Mote" class="w-full border-none rounded-xl p-3 text-sm outline-none bg-white/90 text-slate-900 focus:bg-white focus:ring-2 focus:ring-yellow-400 transition" value={usuario.nombre} onChange={e => setUsuario({nombre: e.target.value})} />
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-white/20">
                        <h2 class="text-xl font-bold text-white mb-4 drop-shadow">2. Fase de Grupos</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {Object.keys(GRUPOS).map(letra => (
                                <div key={letra} class="bg-black/20 p-4 rounded-xl border border-white/10">
                                    <h4 class="font-black text-yellow-400 text-xs uppercase mb-3 tracking-wide">Grupo {letra}</h4>
                                    <div class="space-y-2">
                                        {generarPartidosPorGrupo(letra, GRUPOS[letra]).map(partido => (
                                            <div key={partido.id} class="flex items-center justify-between text-xs bg-white/10 p-2 rounded-lg border border-white/10 text-white">
                                                <span class="w-2/5 text-right font-medium truncate drop-shadow">{bandera(partido.local)}</span>
                                                <div class="flex items-center space-x-1 mx-1">
                                                    <input type="number" min="0" onKeyDown={prevencionTeclasInvalidas} class="w-8 text-center border-none rounded font-bold p-1 bg-white/90 text-slate-900 focus:bg-white focus:ring-2 focus:ring-yellow-400" value={partidos[partido.id].golesL} onChange={e => handleCambioGol(partido.id, 'golesL', e.target.value)} />
                                                    <input type="number" min="0" onKeyDown={prevencionTeclasInvalidas} class="w-8 text-center border-none rounded font-bold p-1 bg-white/90 text-slate-900 focus:bg-white focus:ring-2 focus:ring-yellow-400" value={partidos[partido.id].golesV} onChange={e => handleCambioGol(partido.id, 'golesV', e.target.value)} />
                                                </div>
                                                <span class="w-2/5 text-left font-medium truncate drop-shadow">{bandera(partido.visitante)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-white/20">
                        <h2 class="text-xl font-bold text-white mb-4 drop-shadow">3. Eliminatorias</h2>
                        
                        <div class="mb-6">
                            <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Dieciseisavos (32 Equipos)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2">
                                {clasificados.dieciseisavos.map((v, i) => (
                                    <select key={i} class="border-none rounded-md p-2 text-xs bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={v} onChange={e => handleClasificado('dieciseisavos', i, e.target.value)}>
                                        <option value="">-- Equipo --</option>
                                        {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={clasificados.dieciseisavos.includes(eq) && eq !== v}>{bandera(eq)}</option>)}
                                    </select>
                                ))}
                            </div>
                        </div>

                        <div class="mb-6">
                            <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Octavos (16 Equipos)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2">
                                {clasificados.octavos.map((v, i) => (
                                    <select key={i} class="border-none rounded-md p-2 text-xs bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={v} onChange={e => handleClasificado('octavos', i, e.target.value)}>
                                        <option value="">-- Equipo --</option>
                                        {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={clasificados.octavos.includes(eq) && eq !== v}>{bandera(eq)}</option>)}
                                    </select>
                                ))}
                            </div>
                        </div>

                        <div class="mb-6">
                            <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Cuartos (8 Equipos)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                {clasificados.cuartos.map((v, i) => (
                                    <select key={i} class="border-none rounded-md p-2 text-xs bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={v} onChange={e => handleClasificado('cuartos', i, e.target.value)}>
                                        <option value="">-- Equipo --</option>
                                        {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={clasificados.cuartos.includes(eq) && eq !== v}>{bandera(eq)}</option>)}
                                    </select>
                                ))}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Semifinales (4 Equipos)</h3>
                                <div class="grid grid-cols-2 gap-2">
                                    {clasificados.semifinales.map((v, i) => (
                                        <select key={i} class="border-none rounded-md p-2 text-xs bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={v} onChange={e => handleClasificado('semifinales', i, e.target.value)}>
                                            <option value="">-- Equipo --</option>
                                            {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={clasificados.semifinales.includes(eq) && eq !== v}>{bandera(eq)}</option>)}
                                        </select>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Final (2 Equipos)</h3>
                                <div class="grid grid-cols-2 gap-2">
                                    {clasificados.final.map((v, i) => (
                                        <select key={i} class="border-none rounded-md p-2 text-xs bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={v} onChange={e => handleClasificado('final', i, e.target.value)}>
                                            <option value="">-- Finalista --</option>
                                            {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={clasificados.final.includes(eq) && eq !== v}>{bandera(eq)}</option>)}
                                        </select>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-white/20">
                        <h2 class="text-xl font-bold text-white mb-4 drop-shadow">4. Podio y Goleadores</h2>
                        
                        <div class="mb-8">
                            <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Posición Exacta (4 Primeros)</h3>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                {[1, 2, 3, 4].map(num => (
                                    <select key={num} class="border-none rounded-xl p-3 text-xs font-bold bg-white/90 text-slate-900 w-full outline-none focus:ring-2 focus:ring-yellow-400" value={posiciones[num]} onChange={e => setPosiciones({...posiciones, [num]: e.target.value})}>
                                        <option value="">-- {num}º Puesto --</option>
                                        {TODOS_LOS_EQUIPOS.map(eq => <option key={eq} value={eq} disabled={Object.values(posiciones).includes(eq) && eq !== posiciones[num]}>{bandera(eq)}</option>)}
                                    </select>
                                ))}
                            </div>
                        </div>

                        <div>
                            <h3 class="font-bold text-sm text-yellow-400 mb-3 drop-shadow">Selección de 5 Goleadores</h3>
                            <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                {goleadores.map((g, i) => (
                                    <input key={i} type="text" placeholder={`Goleador ${i+1}`} class="border-none rounded-xl p-3 text-xs bg-white/90 text-slate-900 uppercase outline-none focus:ring-2 focus:ring-yellow-400 placeholder-slate-400 font-bold" value={g} onChange={e => { const n = [...goleadores]; n[i] = e.target.value.toUpperCase(); setGoleadores(n); }} />
                                ))}
                            </div>
                        </div>
                    </div>

                    <div class="text-center pb-12 flex flex-col items-center">
                        {errorValidacion && (
                            <p class="text-red-300 font-bold mb-4 bg-black/40 px-4 py-2 rounded-lg border border-red-400/50 backdrop-blur-sm shadow-md">{errorValidacion}</p>
                        )}
                        <button 
                            onClick={procesarYDescargar} 
                            disabled={!!errorValidacion}
                            class={`font-black tracking-wide px-10 py-4 rounded-xl shadow-2xl transition-all duration-300 ${errorValidacion ? 'bg-white/10 text-white/40 cursor-not-allowed border border-white/10' : 'bg-gradient-to-r from-yellow-400 to-yellow-500 text-green-900 hover:from-yellow-300 hover:to-yellow-400 hover:scale-105 hover:shadow-yellow-500/20'}`}>
                            DESCARGAR APUESTA
                        </button>
                    </div>
                </div>
            );
        }

        function SeccionConsulta({ participantes, reales }) {
            const [seleccionado, setSeleccionado] = useState('');
            if (!participantes || participantes.length === 0) return <div class="text-center p-12 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 text-white/60 font-medium shadow-xl">Sin participantes registrados en el sistema.</div>;

            const actual = participantes.find(p => p.nombre === seleccionado) || participantes[0];
            const totalPts = calcularPorraTotal(actual.apuesta, reales);

            return (
                <div class="space-y-6">
                    <div class="bg-black/30 backdrop-blur-md p-5 rounded-2xl border border-white/10 shadow-xl text-sm">
                        <h3 class="font-bold text-yellow-400 mb-3 border-b border-white/10 pb-2 drop-shadow">📋 Sistema de Puntuación</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 text-emerald-50">
                            <div>
                                <strong class="block mb-1 text-white">Fase de Grupos</strong>
                                <ul class="list-disc pl-4 space-y-1 text-xs opacity-90">
                                    <li>Pleno exacto: <span class="font-bold text-yellow-300">+25p</span></li>
                                    <li>Ganador + 1 gol: <span class="font-bold text-yellow-300">+15p</span></li>
                                    <li>Empate (sin pleno): <span class="font-bold text-yellow-300">+12.5p</span></li>
                                    <li>Acertar ganador: <span class="font-bold text-yellow-300">+10p</span></li>
                                    <li>Acertar 1 gol: <span class="font-bold text-yellow-300">+5p</span></li>
                                </ul>
                            </div>
                            <div>
                                <strong class="block mb-1 text-white">Eliminatorias</strong>
                                <ul class="list-disc pl-4 space-y-1 text-xs opacity-90">
                                    <li>Pasa a 1/16: <span class="font-bold text-yellow-300">+10p</span></li>
                                    <li>Pasa a 1/8: <span class="font-bold text-yellow-300">+20p</span></li>
                                    <li>Pasa a 1/4: <span class="font-bold text-yellow-300">+30p</span></li>
                                    <li>Pasa a Semis: <span class="font-bold text-yellow-300">+40p</span></li>
                                    <li>Llega a Final: <span class="font-bold text-yellow-300">+50p</span></li>
                                </ul>
                            </div>
                            <div>
                                <strong class="block mb-1 text-white">Podio Exacto</strong>
                                <ul class="list-disc pl-4 space-y-1 text-xs opacity-90">
                                    <li>1º Puesto: <span class="font-bold text-yellow-300">+80p</span></li>
                                    <li>2º Puesto: <span class="font-bold text-yellow-300">+60p</span></li>
                                    <li>3º Puesto: <span class="font-bold text-yellow-300">+40p</span></li>
                                    <li>4º Puesto: <span class="font-bold text-yellow-300">+20p</span></li>
                                </ul>
                            </div>
                            <div>
                                <strong class="block mb-1 text-white">Goleadores</strong>
                                <ul class="list-disc pl-4 space-y-1 text-xs opacity-90">
                                    <li>Por cada gol real: <span class="font-bold text-yellow-300">+5p</span></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-xl">
                        <select class="border-none p-3 rounded-xl bg-white/90 text-sm font-bold text-slate-900 outline-none w-full sm:w-64 focus:ring-2 focus:ring-yellow-400" value={seleccionado || actual.nombre} onChange={e => setSeleccionado(e.target.value)}>
                            {participantes.map(p => <option key={p.nombre} value={p.nombre}>{p.nombre}</option>)}
                        </select>
                        <div class="bg-yellow-400 border border-yellow-300 text-center px-6 py-2 rounded-xl shadow-lg">
                            <span class="text-xs font-bold text-green-900 block uppercase opacity-80">Puntuación</span>
                            <span class="text-3xl font-black text-green-900">{totalPts}</span>
                        </div>
                    </div>

                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 shadow-xl">
                        <h3 class="font-bold text-white mb-5 text-xl border-b border-white/10 pb-3 drop-shadow">Fase de Grupos</h3>
                        <div class="space-y-4">
                            {Object.keys(GRUPOS).map(letra => {
                                const partidosGrupo = generarPartidosPorGrupo(letra, GRUPOS[letra]);
                                return (
                                    <div key={letra} class="bg-black/20 p-4 rounded-xl border border-white/10">
                                        <h4 class="font-black text-yellow-400 text-xs uppercase mb-3 drop-shadow">Grupo {letra}</h4>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                            {partidosGrupo.map(partido => {
                                                const pr = actual.apuesta.partidos?.[partido.id];
                                                const re = reales?.partidos?.[partido.id];
                                                const pts = calcularPuntosPartido(pr, re);
                                                const jugado = re && re.golesL !== undefined && re.golesL !== '';
                                                const fechaPartido = re?.fecha || 'Por definir';

                                                let colorBg = 'bg-white/10 border-white/10 text-white';
                                                if (jugado) {
                                                    if (pts === 25) colorBg = 'bg-green-500/50 border-green-400 text-white shadow-inner';
                                                    else if (pts > 0) colorBg = 'bg-yellow-500/50 border-yellow-400 text-white shadow-inner';
                                                    else colorBg = 'bg-red-500/50 border-red-400 text-white shadow-inner';
                                                }

                                                return (
                                                    <div key={partido.id} class={`p-3 rounded-lg border text-xs backdrop-blur-sm transition-all ${colorBg}`}>
                                                        <p class="font-bold truncate text-sm mb-1 drop-shadow">{bandera(partido.local)} vs {bandera(partido.visitante)}</p>
                                                        <p class="opacity-80 font-medium mb-2 border-b border-white/20 pb-1">📅 {fechaPartido}</p>
                                                        <div class="flex justify-between items-center">
                                                            <p class="opacity-90">Apuesta: {pr?.golesL}-{pr?.golesV}</p>
                                                            {jugado && <p class="font-bold text-sm bg-black/30 px-2 py-0.5 rounded shadow-sm">Real: {re.golesL}-{re.golesV} <span class="text-yellow-300 ml-1">(+{pts}p)</span></p>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 shadow-xl space-y-5">
                            <h3 class="font-bold text-white text-xl border-b border-white/10 pb-3 drop-shadow">Eliminatorias</h3>
                            {['dieciseisavos', 'octavos', 'cuartos', 'semifinales', 'final'].map(fase => {
                                const realesFase = reales?.clasificados?.[fase] || [];
                                const faseEmpezada = realesFase.length > 0;
                                const ptsFase = PUNTOS[fase.toUpperCase()];

                                return (
                                    <div key={fase}>
                                        <h4 class="font-bold text-xs text-yellow-400 uppercase drop-shadow mb-2">{fase}</h4>
                                        <div class="flex flex-wrap gap-2 mt-1">
                                            {(actual.apuesta.clasificados?.[fase] || []).map((eq, i) => {
                                                if (!eq) return null;
                                                
                                                let colorTag = 'bg-white/10 text-white border-white/20 backdrop-blur-sm';
                                                let strPuntos = '';

                                                if (faseEmpezada) {
                                                    const acertado = realesFase.some(r => r.trim().toUpperCase() === eq.trim().toUpperCase());
                                                    colorTag = acertado ? 'bg-green-500/60 text-white border-green-400 font-bold shadow-inner' : 'bg-red-500/60 text-white border-red-400 line-through opacity-80';
                                                    if (acertado) strPuntos = ` (+${ptsFase}p)`;
                                                }
                                                return <span key={i} class={`px-3 py-1.5 rounded-lg text-xs border ${colorTag}`}>{bandera(eq)}<span class={faseEmpezada && strPuntos ? "text-yellow-300" : ""}>{strPuntos}</span></span>;
                                            })}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                        
                        <div class="space-y-6">
                            <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 shadow-xl">
                                <h3 class="font-bold text-white mb-4 text-xl border-b border-white/10 pb-3 drop-shadow">Goleadores</h3>
                                <div class="space-y-3 text-sm">
                                    {(actual.apuesta.goleadores || []).map((g, i) => {
                                        const golesReal = obtenerGolesJugador(g, reales);
                                        const colorBg = golesReal > 0 ? 'bg-green-500/50 border-green-400 shadow-inner' : 'bg-white/10 border-white/20';

                                        return (
                                            <div key={i} class={`p-3 rounded-xl flex justify-between items-center border backdrop-blur-sm text-white ${colorBg}`}>
                                                <span class="font-bold tracking-wide drop-shadow">{g || '-'}</span>
                                                {golesReal > 0 && <span class="font-black text-yellow-300 bg-black/30 px-3 py-1 rounded-lg">+{golesReal * PUNTOS.GOLEADOR}p</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            
                            <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 shadow-xl">
                                <h3 class="font-bold text-white mb-4 text-xl border-b border-white/10 pb-3 drop-shadow">Podio Exacto</h3>
                                <div class="space-y-3 text-sm">
                                    {[1, 2, 3, 4].map(num => {
                                        const eq = actual.apuesta.posiciones?.[num];
                                        const realEq = reales?.posiciones?.[num];
                                        const podioRelleno = realEq && realEq.trim() !== '';
                                        
                                        let colorBg = 'bg-white/10 border-white/20 text-white';
                                        let puntosObtenidos = 0;

                                        if (podioRelleno) {
                                            const acertado = realEq.trim().toUpperCase() === (eq ? eq.trim().toUpperCase() : '');
                                            colorBg = acertado ? 'bg-green-500/50 border-green-400 shadow-inner text-white' : 'bg-red-500/50 border-red-400 text-white/90';
                                            if (acertado) puntosObtenidos = PUNTOS[`POS_${num}`];
                                        }

                                        return (
                                            <div key={num} class={`p-3 rounded-xl flex justify-between items-center border backdrop-blur-sm ${colorBg}`}>
                                                <span class="text-yellow-400 font-black drop-shadow">{num}º Puesto</span>
                                                <div class="flex items-center">
                                                    <span class="font-bold drop-shadow text-base">{eq ? bandera(eq) : '-'}</span>
                                                    {puntosObtenidos > 0 && <span class="ml-3 font-black text-yellow-300 bg-black/30 px-2 py-1 rounded-lg">+{puntosObtenidos}p</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function SeccionRanking({ participantes, reales }) {
            if (!participantes || participantes.length === 0) return <div class="text-center p-12 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 text-white/60 font-medium shadow-xl">Sin participantes registrados.</div>;
            const tablaOrdenada = participantes.map(p => ({ nombre: p.nombre, puntos: calcularPorraTotal(p.apuesta, reales) })).sort((a, b) => b.puntos - a.puntos);

            return (
                <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 shadow-xl max-w-2xl mx-auto">
                    <h3 class="text-2xl font-black text-center text-white mb-6 drop-shadow">Clasificación General</h3>
                    <div class="border border-white/20 rounded-xl overflow-hidden divide-y divide-white/10 bg-black/20">
                        {tablaOrdenada.map((user, i) => (
                            <div key={i} class="flex justify-between items-center p-4 hover:bg-white/10 transition-colors text-white">
                                <div class="flex items-center space-x-4">
                                    <span class={`font-black w-8 text-center ${i === 0 ? 'text-yellow-400 text-lg drop-shadow' : i === 1 ? 'text-slate-300 text-lg' : i === 2 ? 'text-amber-600 text-lg' : 'text-emerald-300'}`}>{i+1}º</span>
                                    <span class="font-bold tracking-wide text-lg drop-shadow">{user.nombre}</span>
                                </div>
                                <span class="font-black text-yellow-400 text-xl bg-black/30 px-4 py-1 rounded-lg shadow-inner">{user.puntos}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PorraApp />);
    </script>
</body>
</html>
